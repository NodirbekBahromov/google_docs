<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IB Knowledge Base</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        /* CSS STYLING */
        :root {
            --bg-color: #0f0f11;
            --card-bg: #1a1a1d;
            --text-color: #ffffff;
            --accent-color: #8b8b8b;
            --hover-border: #5c5c5c;
            --highlight: #646cff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 4rem;
            max-width: 600px;
        }

        h1 {
            font-weight: 700;
            font-size: 3rem;
            letter-spacing: -1.5px;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #fff, #a5a5a5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--accent-color);
            font-weight: 300;
            font-size: 1rem;
            line-height: 1.5;
        }

        /* The Grid Layout - Automatically fits 3 columns if space permits */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1000px;
            width: 100%;
        }

        /* Card Styling */
        .card {
            background-color: var(--card-bg);
            border: 1px solid #2a2a2e;
            border-radius: 16px;
            padding: 30px;
            text-decoration: none;
            color: var(--text-color);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 160px;
            position: relative;
            overflow: hidden;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .emoji {
            font-size: 2rem;
        }

        .tag {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: #2a2a2e;
            padding: 4px 8px;
            border-radius: 4px;
            color: var(--accent-color);
            font-weight: 500;
        }

        .card-title {
            font-size: 1.4rem;
            font-weight: 500;
            margin-top: auto; /* Pushes title down */
        }

        .arrow {
            position: absolute;
            bottom: 30px;
            right: 30px;
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.3s ease;
            font-size: 1.2rem;
        }

        /* Hover Effects */
        .card:hover {
            transform: translateY(-5px);
            border-color: var(--hover-border);
            background-color: #232326;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .card:hover .arrow {
            opacity: 1;
            transform: translateX(0);
        }

        /* Color Coding based on Tag (Optional visual flair) */
        .card[data-type="Core"] .tag { color: #ff8b8b; }
        .card[data-type="IA"] .tag { color: #8bafff; }
        .card[data-type="Lang"] .tag { color: #8bffb5; }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .grid-container {
                grid-template-columns: 1fr; 
            }
            .card {
                height: 140px;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>IB Dashboard</h1>
        <p class="subtitle">Centralized archive for Internal Assessments, Core Components, and Literature.</p>
    </header>

    <div class="grid-container" id="grid">
        <!-- Javascript will inject cards here -->
    </div>

    <script>
        // ==========================================
        // CONFIGURATION SECTION
        // PASTE YOUR GOOGLE DOC LINKS BELOW
        // ==========================================
        
        const resources = [
            // --- THE CORE ---
            { 
                title: "Theory of Knowledge", 
                emoji: "🧠", 
                type: "Core",
                link: "https://docs.google.com/document/d/1fjPrqgHZ-bqxksien-9_iTl-d5hqq9ObkpSh7o5LgBk/edit?usp=sharing" // PASTE LINK HERE
            },
            { 
                title: "Extended Essay", 
                emoji: "🎓", 
                type: "Core",
                link: "https://docs.google.com/document/d/17UfGJzD3pceeiEAWY3pFwfGKeyUC7tQTplhIfZdvu5I/edit?usp=sharing" // PASTE LINK HERE
            },
            { 
                title: "CAS Portfolio", 
                emoji: "🧗", 
                type: "Core",
                link: "https://docs.google.com/document/d/1PjUXHRQCtsPx0nO2FMqBF9r77syM07rBU7rsqtv1_q8/edit?usp=sharing" // PASTE LINK HERE
            },

            // --- SCIENCES & MATH (IAs) ---
            { 
                title: "Math Analysis", 
                emoji: "📐", 
                type: "IA",
                link: "https://docs.google.com/document/d/..." // PASTE LINK HERE
            },
            { 
                title: "Physics", 
                emoji: "⚛️", 
                type: "IA",
                link: "https://docs.google.com/document/d/1PjUXHRQCtsPx0nO2FMqBF9r77syM07rBU7rsqtv1_q8/edit?usp=sharing" // PASTE LINK HERE
            },
            { 
                title: "Computer Science", 
                emoji: "💻", 
                type: "IA",
                link: "https://docs.google.com/document/d/1TzpVAEhaJFJhgICneqeN3Vjotsc9KswR8kTJ69ZxQoM/edit?usp=sharing" // PASTE LINK HERE
            },

            // --- LANGUAGES & SOCIAL ---
            { 
                title: "Economics Commentary", 
                emoji: "📈", 
                type: "IA",
                link: "https://docs.google.com/document/d/1pn_weUYIkj5i70Zq5YLnB0m8QnpJyMCXsk-nmQSc4Ok/edit?usp=sharing" // PASTE LINK HERE
            },
            { 
                title: "English B", 
                emoji: "🇬🇧", 
                type: "Lang",
                link: "https://docs.google.com/document/d/1hQ3_funh0JmviCu7juCF_T2iBmlck_1StLqDCLaYb2g/edit?usp=sharing" // PASTE LINK HERE
            },
            { 
                title: "Russian A", 
                emoji: "🪆", 
                type: "Lang",
                link: "https://docs.google.com/document/d/1XT1T-tR-tPwmZ5cTisGIoGgbBLe5SwlZ4Jjo0RHG-L8/edit?usp=sharing" // PASTE LINK HERE
            }
        ];

        // ==========================================
        // SYSTEM CODE (DO NOT EDIT BELOW)
        // ==========================================

        const grid = document.getElementById('grid');

        resources.forEach(item => {
            const a = document.createElement('a');
            a.href = item.link;
            a.target = "_blank";
            a.className = "card";
            a.setAttribute("data-type", item.type);

            a.innerHTML = `
                <div class="card-header">
                    <div class="emoji">${item.emoji}</div>
                    <div class="tag">${item.type}</div>
                </div>
                <div class="card-title">${item.title}</div>
                <div class="arrow">→</div>
            `;

            grid.appendChild(a);
        });
    </script>

</body>
</html>
